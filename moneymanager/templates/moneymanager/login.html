{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MoneyManager</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="font-black text-4xl tracking-widest text-purple-600 uppercase italic">
                Money<span class="text-gray-900">Manager</span>
            </h1>
            <p class="text-gray-500 mt-2 font-medium">Connectez-vous à votre espace personnel</p>
        </div>

        <!-- Carte de connexion -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            
            {% if form.errors %}
                <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold text-center mb-6 border border-red-100">
                    Nom d'utilisateur ou mot de passe incorrect.
                </div>
            {% endif %}

            <form method="POST" action="{% url 'moneymanager:login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nom d'utilisateur</label>
                    <input type="text" name="username" required autofocus
                           class="w-full border-gray-300 rounded-xl shadow-sm focus:border-purple-500 focus:ring-purple-500 p-3 bg-gray-50">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Mot de passe</label>
                    <input type="password" name="password" required
                           class="w-full border-gray-300 rounded-xl shadow-sm focus:border-purple-500 focus:ring-purple-500 p-3 bg-gray-50">
                </div>

                <button type="submit" class="w-full bg-gray-900 text-white font-black uppercase tracking-widest py-4 rounded-xl shadow-lg hover:bg-black transition-all transform active:scale-95 mt-4">
                    Entrer dans le coffre
                </button>
            </form>
        </div>
    </div>

</body>
</html>
